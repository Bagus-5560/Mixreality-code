<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Rancang AR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- UI: Home Screen -->
    <div id="screen-home" class="screen active">
        <header class="home-header">
            <div class="avatar">☀️</div>
            <div class="greeting">
                <h2>Ayo Bermain!</h2>
                <p>Pilih petualanganmu hari ini</p>
            </div>
        </header>

        <main class="home-main">
            <button class="big-btn yellow">Bangun Ruang<span class="sub">Mengenal bentuk 3D!</span></button>
            <button class="big-btn green">Susun Balok<span class="sub">Ayo buat menara!</span></button>
            <button class="big-btn blue">Tantangan Bentuk<span class="sub">Pasangkan bentuknya!</span></button>
        </main>

        <nav class="home-bottomnav">
            <button id="nav-home" class="nav-item active">🏠</button>
            <button id="nav-builder" class="nav-item">📷</button>
            <button id="nav-profile" class="nav-item">⭐</button>
        </nav>
    </div>

    <!-- UI: Builder / AR Screen -->
    <div id="screen-builder" class="screen">
        <div id="status">Klik tombol untuk mengaktifkan kamera</div>
        <button id="btn-tracking">Aktifkan Kamera</button>

        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="tracking_canvas"></canvas>
        <canvas id="output_canvas"></canvas>

        <!-- Right-side controls -->
        <div class="right-controls">
            <button id="btn-switch-cam" class="rc-btn switch-cam" title="Ganti Kamera">🔄</button>
            <button class="rc-btn mute">🔊</button>
            <button class="rc-btn undo">↺</button>
            <button class="rc-btn like">👍</button>
            <button id="btn-delete" class="rc-btn delete">🗑️</button>
        </div>

        <!-- Bottom floating camera + carousel -->
        <div class="bottom-fab">
            <div id="carousel" class="carousel">
                <button class="block blue" data-shape="cube">■</button>
                <button class="block yellow" data-shape="tri">▲</button>
                <button class="block green" data-shape="pyramid">▶</button>
                <button class="block red" data-shape="pent">⬟</button>
            </div>
            <button id="camera-btn" class="camera-btn">📷</button>
        </div>

        <nav class="builder-bottomnav">
            <button id="nav-home-2" class="nav-item">🏠</button>
            <button id="nav-builder-2" class="nav-item active">📷</button>
            <button id="nav-profile-2" class="nav-item">⭐</button>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script src="js/app.js"></script>
</body>
</html>
